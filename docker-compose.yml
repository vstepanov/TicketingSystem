# =============================================================================
# Ticketing System — one-command startup from a clean checkout.
#
#     docker compose up --build
#
# Only Docker (with the Compose plugin) is required on the host. Configuration
# is supplied via a local `.env` file (copy from `.env.example`).
#
# Startup ordering:
#   db       -> starts and becomes healthy (pg_isready)
#   migrate  -> waits for db healthy, applies migrations, then exits (one-shot)
#   web      -> waits for migrate to complete successfully, then serves traffic
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18 — durable application data store.
  # ---------------------------------------------------------------------------
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketing}
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
    ports:
      # Expose for local tooling; container always listens on 5432 internally.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      # Gate dependents on the DB actually accepting connections.
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing} -d ${POSTGRES_DB:-ticketing}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # One-shot migration runner. Uses the `build` stage of the Dockerfile because
  # migrations need devDependencies (drizzle-kit) and the source/migration
  # files, which the slim runtime image does not carry. Exits when done.
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: ["npm", "run", "db:migrate"]
    restart: "no"
    env_file:
      - .env
    environment:
      # Inside the compose network the DB host is the `db` service name. This is
      # built from the POSTGRES_* parts (not the host `.env` DATABASE_URL, which
      # points at localhost for host tooling) so the two run modes never clash.
      DATABASE_URL: postgres://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing}@db:5432/${POSTGRES_DB:-ticketing}
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Next.js web app (SPA + API route handlers). Serves traffic only after
  # migrations have completed successfully.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # In-network DB host (`db`), built from POSTGRES_* so it stays in sync and
      # overrides the localhost DATABASE_URL that `.env` supplies for host tooling.
      DATABASE_URL: postgres://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing}@db:5432/${POSTGRES_DB:-ticketing}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      # Gate orchestration on readiness (§4.9): the web container is only
      # considered healthy once GET /api/ready returns HTTP 200 (DB reachable).
      # A 503 (not_ready) or a connection failure exits non-zero → unhealthy.
      # Uses Node (always present in this image) so no curl/wget dependency is
      # required in the slim runtime.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/ready').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

# Named volume so Postgres data survives container recreation.
volumes:
  pgdata:
